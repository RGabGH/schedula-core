<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/smartscheduler.css">
    <link rel="stylesheet" href="css/scheduler-themes.css">
    <link rel="stylesheet" href="bootstrap/bootstrap.css">
    <link rel="stylesheet" href="css/popup.css">
    <title>SchedulaCore — Plugin Test</title>

    <style>
        #plugin-status {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            padding: 4px 10px;
            background: #1e293b;
            color: #fff;
            font-family: monospace;
            font-size: 13px;
            border-radius: 6px;
            margin: 4px 0 4px 8px;
            vertical-align: middle;
        }

        .badge-ok {
            background: #22c55e;
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .badge-off {
            background: #ef4444;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .task-drag-source {
            display: inline-flex;
            align-items: center;
            padding: 0 12px;
            height: 28px;
            background: #5762ca;
            color: #fff;
            font-family: monospace;
            font-size: 13px;
            font-weight: 600;
            border-radius: 4px;
            cursor: grab;
            user-select: none;
            margin: 6px 8px;
            box-shadow: 0 2px 6px rgba(87,98,202,0.4);
            letter-spacing: 0.02em;
        }
        .theme-dark .task-drag-source  { background: #5762ca; box-shadow: 0 2px 6px rgba(87,98,202,0.4); }
        .theme-blue .task-drag-source  { background: #3b82f6; box-shadow: 0 2px 6px rgba(59,130,246,0.4); }
        .theme-soft .task-drag-source  { background: #818cf8; box-shadow: 0 2px 6px rgba(129,140,248,0.4); }
    </style>
</head>

<body>
    <!-- Draggable external task for drop-onto-scheduler test -->
    <div id="task-drag-source" class="task-drag-source" draggable="true" ondragstart="startdrag(event);"
        data-text1="NEW TASK" data-text2="Dropped task description" data-order="123456789"
        data-classes="" data-w="2880" data-key="orderID" data-color=""
        data-ref="reference" data-pieces="4" data-json="">&#9654; NEW TASK</div>

    <div id="themesdiv" class="row m-1 align-items-center">
        <span class="me-2 fw-bold">Themes:</span>
        <button type="button" class="btn btn-sm btn-outline-secondary m-1" onclick="setTheme('')">Default</button>
        <button type="button" class="btn btn-sm btn-dark m-1" onclick="setTheme('theme-dark')">Dark</button>
        <button type="button" class="btn btn-sm btn-primary m-1" onclick="setTheme('theme-blue')">Blue</button>
        <button type="button" class="btn btn-sm btn-light m-1 border" onclick="setTheme('theme-soft')">Soft</button>
        <!-- Plugin status badges (populated by JS after init) -->
        <span id="plugin-status"></span>
    </div>

    <div id="datadiv" class="row m-1">
        <button class="btn btn-outline-secondary m-1" onclick="setData(hotelSchedulerData)">hotel</button>
        <button class="btn btn-outline-secondary m-1" onclick="setData(hrSchedulerData)">humans</button>
        <button class="btn btn-outline-secondary m-1" onclick="setData(productionSchedulerData)">production</button>
        <button class="btn btn-outline-secondary m-1" onclick="setData(clinicSchedulerData)">medical</button>
        <input type="text" class="form-control col-1 m-1" placeholder="search..." onkeyup="filterItems(this)">
    </div>

    <div id="adjust" class="row m-1">
        <button class="btn btn-outline-secondary m-1" onclick="setView(40)"><- 40 -></button>
        <button class="btn btn-outline-secondary m-1" onclick="setView(30)"><- 30 -></button>
        <button class="btn btn-outline-secondary m-1" onclick="setView(20)"><- 20 -></button>
        <button class="btn btn-outline-secondary m-1" onclick="setView(10)"><- 10 -></button>
    </div>

    <div id="styleselect" class="row m-1">
        <button class="btn btn-outline-secondary m-1" onclick="setStyle('rect')">rect</button>
        <button class="btn btn-outline-secondary m-1" onclick="setStyle('round-rect')">roundrect</button>
        <button class="btn btn-outline-secondary m-1" onclick="setStyle('arrow')">arrow</button>
        <button class="btn btn-outline-secondary m-1" onclick="setStyle('circle')">circle</button>
        <button class="btn btn-outline-secondary m-1" onclick="toggleLinks()">links</button>
    </div>

    <div id="scheduler"></div>

    <!-- Data files -->
    <script src="data/scheduler-data.js"></script>
    <script src="data/hr-data.js"></script>
    <script src="data/medical-data.js"></script>
    <script src="data/production-data.js"></script>
    
    <script src="data/ss-data-hotel.js"></script>

    <!-- Icons -->
    <script src="icons.js"></script>

    <!-- PRO Bundle: Core + DragDropPlugin + LinksPlugin + EventsPlugin (IIFE, no module imports needed) -->
    <script src="tmp/pro-test.js"></script>

    <script>
        // ── Plugin status badge ────────────────────────────────────────
        function renderPluginBadges(sched) {
            var pluginNames = ['dragdrop', 'links', 'events', 'contextmenu'];
            var labels = { dragdrop: 'DragDrop', links: 'Links', events: 'Events', contextmenu: 'ContextMenu' };
            var el = document.getElementById('plugin-status');
            el.textContent = 'Plugins: ';
            pluginNames.forEach(function (name) {
                var ok = sched.getPlugin(name) !== null;
                var b = document.createElement('span');
                b.className = ok ? 'badge-ok' : 'badge-off';
                b.textContent = labels[name] + (ok ? ' \u2713' : ' \u2717');
                el.appendChild(b);
            });

            // PRO / Free license badge
            var licInfo = (typeof validateLicense === 'function')
                ? validateLicense(sched.settings && sched.settings.licenseKey)
                : { valid: false, expired: false, perpetual: false, expiresAt: null, customerId: 0 };
            var isProLic = licInfo.valid && !licInfo.expired;
            var lic = document.createElement('span');
            lic.className = isProLic ? 'badge-ok' : 'badge-off';
            lic.textContent = isProLic ? 'PRO \u2713' : 'Free \u2717';
            if (isProLic) {
                lic.title = licInfo.perpetual
                    ? 'Licenza PRO perpetua — cliente #' + licInfo.customerId
                    : 'Licenza PRO — scade ' + licInfo.expiresAt.toLocaleDateString('it-IT', { year: 'numeric', month: 'long' }) + ' — cliente #' + licInfo.customerId;
            } else if (licInfo.valid && licInfo.expired) {
                lic.title = 'Licenza PRO scaduta il ' + licInfo.expiresAt.toLocaleDateString('it-IT', { year: 'numeric', month: 'long' });
                lic.textContent = 'PRO scaduta \u26A0';
            } else {
                lic.title = 'Licenza Free — funzionalità PRO non disponibili';
            }
            el.appendChild(lic);
        }

        /**
         * ESEMPIO DI POPUP CUSTOM PER LA VERSIONE CORE (STANDALONE)
         * Questa classe mostra come l'utente può implementare la propria UI
         * senza dipendere dai plugin PRO.
         */
        class MyUserPopup {
            constructor() {
                this.element = document.createElement('div');
                this.element.style.cssText = `
                    position: fixed;
                    background: #fff;
                    border: 2px solid #334155;
                    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
                    padding: 20px;
                    z-index: 10000;
                    display: none;
                    border-radius: 8px;
                    min-width: 250px;
                    font-family: sans-serif;
                `;
                document.body.appendChild(this.element);
            }

            show(item, event, scheduler) {
                this.element.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid #e2e8f0; padding-bottom:10px;">
                        <h3 style="margin:0; font-size:16px; color:#1e293b;">Core Preview</h3>
                        <button onclick="this.closest('div').parentElement.parentElement.style.display='none'" style="border:none; background:none; cursor:pointer; font-size:18px;">&times;</button>
                    </div>
                    <div style="font-size:14px; color:#475569; line-height:1.6;">
                        <p><strong>Item:</strong> ${item.Text || 'Untitled'}</p>
                        <p><strong>Resource:</strong> ${item.Resource}</p>
                        <p style="margin-top:10px; font-style:italic; font-size:12px; color:#94a3b8;">Questo è un popup custom definito nell'HTML per la versione Core Open Source.</p>
                    </div>
                `;
                this.element.style.left = event.clientX + 'px';
                this.element.style.top = event.clientY + 'px';
                this.element.style.display = 'block';
            }

            hide() {
                this.element.style.display = 'none';
            }
        }

        // ── Settings + Plugin registration ────────────────────────────
        var settings = new SchedulaSettings();

        // DECOMMENTA questa riga se vuoi testare un popup custom nel Core
        // settings.popupProvider = new MyUserPopup();

        // PRO plugins registered via settings.plugins — the Core receives them in init()
        settings.plugins = [
            new DragDropPlugin(),
            new LinksPlugin(),
            new EventsPlugin(),
            new DefaultPopupPlugin(),
            new ContextMenuPlugin()
          // ,  new AdvancedPopupPlugin()
        ];

        settings.date = new Date();
        settings.canMoveItems = true;
        settings.canResizeItems = true;
        settings.drawLinks = false;
        settings.itemsLinks = false;

        if (typeof iconssvg !== 'undefined') {
            settings.icons = iconssvg;
        }

        settings.licenseKey = 'SCHED-6TTDT-6TTDT-8Y8DL';
       
        // ── Init ───────────────────────────────────────────────────────
        var scheduler = new SchedulaCore("scheduler", schedulerData, settings);
        scheduler.init();
       

        renderPluginBadges(scheduler);

        window.scheduler = scheduler;

        // ── UI helpers ─────────────────────────────────────────────────
        window.filterItems = function (input) {
            scheduler.filterItems(input.value);
        };

        window.setTheme = function (theme) {
            var el = document.getElementById("scheduler");
            el.classList.remove('theme-dark', 'theme-blue', 'theme-soft');
            document.body.classList.remove('theme-dark', 'theme-blue', 'theme-soft');
            if (theme) {
                el.classList.add(theme);
                document.body.classList.add(theme);
            }
        };
 setTheme('theme-blue');
        window.setView = function (num) {
            scheduler.setView(num);
        };

        window.setStyle = function (style) {
            scheduler.setStyle(style);
        };

        window.toggleLinks = function () {
            scheduler.settings.drawLinks = !scheduler.settings.drawLinks;
            scheduler.settings.itemsLinks = scheduler.settings.drawLinks;
            scheduler.refresh();
        };

        window.setData = function (dati) {
            scheduler.setData(dati);
        };

        // ── Scheduler callbacks ────────────────────────────────────────
        window.modified = function () {
            console.log('[modified] data changed');
        };

        window.resourceClick = function (event, resource) {
            alert('Resource: ' + (resource.resource && resource.resource.Name ? resource.resource.Name : '?') + ' clicked!');
        };

        window.itemMouseEnter = function (event, item) { };
        window.itemMouseExit = function (event, item) { };
        window.itemMouseDown = function (event, item) { };
        window.timeMouseClick = function (event, item) { };
        window.gridMouseClick = function (event, item) { };
        window.gridMouseOver = function (event, item) { };

        // ── External drag support ──────────────────────────────────────
        window.startdrag = function (evt) {
            var data = {
                text1: evt.target.getAttribute('data-text1'),
                text2: evt.target.getAttribute('data-text2'),
                order: evt.target.getAttribute('data-order'),
                classes: evt.target.getAttribute('data-classes'),
                width: evt.target.getAttribute('data-w'),
                key: evt.target.getAttribute('data-key'),
                color1: evt.target.getAttribute('data-color'),
                ref: evt.target.getAttribute('data-ref'),
                pieces: evt.target.getAttribute('data-qt'),
                json: evt.target.getAttribute('data-json')
            };
            evt.dataTransfer.setData("task", JSON.stringify(data));
            evt.dataTransfer.effectAllowed = "move";
        };
    </script>

</body>

</html>
