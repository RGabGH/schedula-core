<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/smartscheduler.css">
    <link rel="stylesheet" href="css/scheduler-themes.css">
    <link rel="stylesheet" href="bootstrap/bootstrap.css">
    <link rel="stylesheet" href="css/popup.css">

    <title></title>

</head>

<body>
    <div id="mydivid" style="height: 50px;" draggable="true" ondragstart="startdrag(event);" data-text1="DROPPED TASK"
        data-text2="dropped task description" data-order="123456789" data-classes="" data-w="2880" data-key="orderID"
        data-color="#874556" data-ref="reference" data-pieces="4" data-json="">NEW TASK</div>
    <div id="themesdiv" class="row m-1 align-items-center">
        <span class="me-2 fw-bold">Themes:</span>
        <button type="button" class="btn btn-sm btn-outline-secondary m-1" onclick="setTheme('')">Default</button>
        <button type="button" class="btn btn-sm btn-dark m-1" onclick="setTheme('theme-dark')">Dark</button>
        <button type="button" class="btn btn-sm btn-primary m-1" onclick="setTheme('theme-blue')">Blue</button>
        <button type="button" class="btn btn-sm btn-light m-1 border" onclick="setTheme('theme-soft')">Soft</button>
    </div>
    <div id="datadiv" class="row m-1">
        <button class="btn btn-outline-secondary m-1" onclick="setData(hotelSchedulerData)">hotel</button>
        <button class="btn btn-outline-secondary m-1" onclick="setData(hrSchedulerData)">humans</button>
        <button class="btn btn-outline-secondary m-1" onclick="setData(productionSchedulerData)">production</button>
        <button class="btn btn-outline-secondary m-1" onclick="setData(clinicSchedulerData)">medical</button>
        <input type="text" class="form-control col-1 m-1" placeholder="search..." onkeyup="filterItems(this)">

    </div>
    <div id="adjust" class="row m-1">
        <button class="btn btn-outline-secondary m-1" onclick="setView(40)"><- 40 -></button>
        <button class="btn btn-outline-secondary m-1" onclick="setView(30)"><- 30 -></button>
        <button class="btn btn-outline-secondary m-1" onclick="setView(20)"><- 20 -></button>
        <button class="btn btn-outline-secondary m-1" onclick="setView(10)"><- 10 -></button>


    </div>
    <div id="styleselect" class="row m-1">
        <button class="btn btn-outline-secondary m-1" onclick="setStyle('rect')">rect</button>
        <button class="btn btn-outline-secondary m-1" onclick="setStyle('round-rect')">roundrect</button>
        <button class="btn btn-outline-secondary m-1" onclick="setStyle('arrow')">arrow</button>
        <button class="btn btn-outline-secondary m-1" onclick="setStyle('circle')">circle</button>


    </div>

    <div id="scheduler"></div>


    <script src="data/scheduler-data.js"></script>
    <script src="data/hr-data.js"></script>
    <script src="data/medical-data.js"></script>
    <script src="data/production-data.js"></script>
    <script src="data/hotel-data.js"></script>
    <script src="data/ss-data-hotel.js"></script>
    <script src="data/medical.js"></script>


    <script src="icons.js"></script>


    <script type="module">
        import { SchedulaCore } from './src/SchedulaCore.js';
        import { SchedulaSettings } from './src/models/SchedulaSettings.js';
        import { SchedulaTemplate } from './src/ui/SchedulaTemplate.js';

        // Initialize settings
        // Assuming global 'settings' variable was expected, we create it here or use a new one.
        // Old code: const scheduler = new Scheduler("scheduler", medicaldata, settings);
        // settings came from scheduler-settings.js.
        // We will create a new instance.
        const settings = new SchedulaSettings();
        if (typeof iconssvg !== 'undefined') {
            settings.icons = iconssvg;
        }

        const scheduler = new SchedulaCore("scheduler", window.medicaldata, settings);
        scheduler.init();

        // Expose scheduler to window for debugging and other functions
        window.scheduler = scheduler;

        window.filterItems = function (input) {
            console.log(input.value);
            scheduler.filterItems(input.value);
        }

        window.setTheme = function (theme) {
            const schedulerDiv = document.getElementById("scheduler");
            // Reset classes
            schedulerDiv.classList.remove('theme-dark', 'theme-blue', 'theme-soft');
            document.body.classList.remove('theme-dark', 'theme-blue', 'theme-soft');

            if (theme) {
                schedulerDiv.classList.add(theme);
                document.body.classList.add(theme);
            }
        }

        window.setColor = function (id, color) {
            scheduler.setItemColor(id, color);
        }

        window.setView = function (num) {
            scheduler.setView(num);
        }

        window.setStyle = function (style) {
            scheduler.setStyle(style);
        }

        window.setData = function (dati) {
            console.log('load data');
            scheduler.setData(dati);
        }

        window.modified = function () {
            console.log('mods');
        }

        window.gridMouseOver = function (event, item) {
            console.log(event);
            console.log(item);
        }

        window.resourceClick = function (event, resource) {
            alert('Resource:' + resource.Name + ' cliccked!');
        }

        window.itemMouseEnter = function (event, item) { }
        window.itemMouseExit = function (event, item) { }
        window.itemMouseDown = function (event, item) { }
        window.timeMouseClick = function (event, item) { }
        window.gridMouseClick = function (event, item) { }

        window.startdrag = function (evt) {
            // Add the target element's id to the data transfer object
            var data = {};
            data.text1 = evt.target.getAttribute('data-text1');
            data.text2 = evt.target.getAttribute('data-text2');
            data.order = evt.target.getAttribute('data-order');
            data.classes = evt.target.getAttribute('data-classes');
            data.width = evt.target.getAttribute('data-w');
            data.key = evt.target.getAttribute('data-key');
            data.color1 = evt.target.getAttribute('data-color');
            data.ref = evt.target.getAttribute('data-ref');
            data.pieces = evt.target.getAttribute('data-qt');
            data.json = evt.target.getAttribute('data-json');
            data.element = evt.target;
            evt.dataTransfer.setData("task", JSON.stringify(data));
            evt.dataTransfer.effectAllowed = "move";
        }
    </script>

</body>

</html>
