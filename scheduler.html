    <div id="themesdiv" class="row m-1">

        <button type="button" class="btn btn-sm btn-outline-primary m-1" onclick="setTheme('')">default</button>
        <button type="button" class="btn btn-sm btn-dark m-1" onclick="setTheme('theme-dark')">dark</button>
        <button type="button" class="btn btn-sm btn-primary m-1" onclick="setTheme('theme-blue')">blue</button>
        <button type="button" class="btn btn-sm btn-warning m-1" onclick="setTheme('theme-contrast')">contrast</button>
        <button type="button" class="btn btn-sm btn-light m-1" onclick="setTheme('theme-light')">light</button>
        <button type="button" class="btn btn-sm btn-info m-1" onclick="setTheme('ocean-breeze')">ocean</button>
        <button type="button" class="btn btn-sm btn-outline-danger m-1" onclick="setTheme('sunset-luxe')">sunset</button>
        <button type="button" class="btn btn-sm btn-outline-success m-1" onclick="setTheme('emerald-elegance')">emerald</button>
        <button type="button" class="btn btn-sm m-1"  style="border:1;border-color:indigo" onclick="setTheme('royal-indigo')">indigo</button>

        <button type="button" class="btn btn-sm btn-outline-secondary m-1" onclick="setTheme('midnight-abyss')">midnight-abyss</button>

        <button type="button" class="btn btn-sm btn-outline-secondary m-1" onclick="setTheme('blazing-sunset')">blazing-sunset</button>
        <button type="button" class="btn btn-sm btn-outline-secondary m-1" onclick="setTheme('frostbite')">frostbite</button>
        <button type="button" class="btn btn-sm btn-outline-secondary m-1" onclick="setTheme('royal-bourbon')">Royal Bourbon</button>
       
    </div>
    <div id="datadiv" class="row m-1">
        <button class="btn btn-outline-secondary m-1" onclick="setData(hotelData)">hotel</button>
        <button class="btn btn-outline-secondary m-1" onclick="setData(hrSchedulerData)">humans</button>
        <button class="btn btn-outline-secondary m-1" onclick="setData(productionSchedulerData)">production</button>
        <button class="btn btn-outline-secondary m-1" onclick="setData(clinicSchedulerData)">medical</button>
        <input type="text" class="form-control col-1 m-1" placeholder="search..." onkeyup="filterItems(this)">       
       
    </div>
    <div id="adjust" class="row m-1">
        <button class="btn btn-outline-secondary m-1" onclick="setView(40)"><- 40 -></button>
        <button class="btn btn-outline-secondary m-1" onclick="setView(30)"><- 30 -></button>
        <button class="btn btn-outline-secondary m-1" onclick="setView(20)"><- 20 -></button>
        <button class="btn btn-outline-secondary m-1" onclick="setView(10)"><- 10 -></button>
       
       
    </div>
    <div id="styleselect" class="row m-1">
        <button class="btn btn-outline-secondary m-1" onclick="setStyle('rect')">rect</button>
        <button class="btn btn-outline-secondary m-1" onclick="setStyle('round-rect')">roundrect</button>
        <button class="btn btn-outline-secondary m-1" onclick="setStyle('arrow')">arrow</button>
        <button class="btn btn-outline-secondary m-1" onclick="setStyle('circle')">circle</button>
         
       
    </div>
    <div id="search" class="row m-1">
        <span class="col-3 m-1"></span>
        <input type="text" class="form-control col-1 m-1" placeholder="search..." onkeyup="filterItems(this)">   
         
       
    </div>

    <script>
        settings.icons=iconssvg;
        
        const scheduler = new Scheduler("scheduler", medicaldata, settings);      
        scheduler.init();



       



        function filterItems(input){
          console.log(input.value);
        
          scheduler.filterItems(input.value);
        }
      
        function setTheme(theme){
            document.getElementById("scheduler").classList.value="";
            document.getElementById("scheduler").classList.add(theme);
        }
        function setColor(id,color){
           scheduler.setItemColor(id,color);
          
        }
        function setView(num){
           scheduler.settings.timeUnitsView = num;
           scheduler.init();
        }
        function setStyle(style){
           settings.gStyle=style;
           scheduler.init();
        }
        function setData(dati){
            console.log('load data');
            scheduler.data=dati;
            scheduler.init();
        }
       
        function modified(){
            console.log('mods');
        }
        function gridMouseOver(event, item){
            console.log(event);
            console.log(item);
        }
       
        function resourceClick(event, resource){
            alert('Resource:' +resource.Name + ' cliccked!');
                
      
            
        }

       
        function itemMouseEnter(event, item){
          
        
        }
        function itemMouseExit(event, item){
         
        
        }
        function itemMouseDown(event, item){
            console.log(item.item);
            scheduler.setItemColor(item.item.Id,"red");
        
        }
        function timeMouseClick(event, item){
          
        
        }
        function gridMouseClick(event, item){
          
        
        }

        function startdrag(evt) {
            // Add the target element's id to the data transfer object
           
            var data = {};
            data.text1 = evt.target.getAttribute('data-text1');
            data.text2 = evt.target.getAttribute('data-text2');
            data.order = evt.target.getAttribute('data-order');
            data.classes = evt.target.getAttribute('data-classes');
            data.width = evt.target.getAttribute('data-w');
            data.key = evt.target.getAttribute('data-key');
            data.color1 = evt.target.getAttribute('data-color');
            data.ref = evt.target.getAttribute('data-ref');
            data.pieces = evt.target.getAttribute('data-qt');
            data.json = evt.target.getAttribute('data-json');
            data.element = evt.target;
            evt.dataTransfer.setData("task", JSON.stringify(data));
            evt.dataTransfer.effectAllowed = "move";

        }
       
    </script>
</body>
</html>
