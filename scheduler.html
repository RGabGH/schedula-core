    <style>
        .code-container {
          background-color: #2d2d2d;
          color: #f8f8f2;
          border-radius: 8px;
          overflow: hidden;
          font-family: Consolas, monospace;
          margin: 1em auto;  /* Centrato orizzontalmente */
          max-width: 600px;  /* Limita la larghezza */
          width: 100%;       /* Assicura che non vada oltre il 100% */
        }
    
        .code-header {
          background-color: #1e1e1e;
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 0.5em 1em;
          font-size: 0.9em;
          color: #ccc;
        }
    
        .copy-btn {
          background-color: #444;
          border: none;
          color: white;
          padding: 0.3em 0.7em;
          border-radius: 4px;
          cursor: pointer;
        }
    
        .copy-btn:hover {
          background-color: #666;
        }
    
        pre {
          margin: 0;
          padding: 1em;
          overflow-x: auto;
        }
      </style>

    <div class="code-container">
      <div class="code-header">
        <span>JavaScript</span>
        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
      </div>
      <pre><code>
    // Questo è un esempio di codice JavaScript
    function saluta(nome) {
      console.log("Ciao, " + nome + "!");
    }
    saluta("Marco");
      </code></pre>
    </div>
    
    <script>
      function copyCode(button) {
        const code = button.closest('.code-container').querySelector('code').innerText;
        navigator.clipboard.writeText(code).then(() => {
          button.textContent = "Copiato!";
          setTimeout(() => button.textContent = "Copy", 2000);
        });
      }
    </script>

    <script>
       
       function startdrag(evt) {
            // Add the target element's id to the data transfer object
           
            var data = {};
            data.text1 = evt.target.getAttribute('data-text1');
            data.text2 = evt.target.getAttribute('data-text2');
            data.order = evt.target.getAttribute('data-order');
            data.classes = evt.target.getAttribute('data-classes');
            data.width = evt.target.getAttribute('data-w');
            data.key = evt.target.getAttribute('data-key');
            data.color1 = evt.target.getAttribute('data-color');
            data.ref = evt.target.getAttribute('data-ref');
            data.pieces = evt.target.getAttribute('data-qt');
            data.json = evt.target.getAttribute('data-json');
            data.element = evt.target;
            evt.dataTransfer.setData("task", JSON.stringify(data));
            evt.dataTransfer.effectAllowed = "move";

        }
       
       
        
        const scheduler1 = new Scheduler("scheduler", hrSchedulerData, template2);

            document.getElementById("scheduler").classList.value="";
            document.getElementById("scheduler").classList.add(theme);

            console.log('load data');
            scheduler1.data=dati;
